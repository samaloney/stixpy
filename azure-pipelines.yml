name: $(BuildDefinitionName)_$(Date:yyyyMMdd)$(Rev:.rr)
variables:
  CI_NAME: Azure Pipelines
  CI_BUILD_ID: $(Build.BuildId)
  CI_BUILD_URL: "https://dev.azure.com/samaloney/STIXpy/_build/results?buildId=$(Build.BuildId)"
  CIBW_BUILD: cp39-* cp310-* cp311-*
  CIBW_SKIP: "*-win32 *-manylinux1_i686"

resources:
  repositories:
  - repository: OpenAstronomy
    type: github
    endpoint: samaloney
    name: OpenAstronomy/azure-pipelines-templates
    ref: master

trigger:
  branches:
    include:
    - '*'
    exclude:
    - '*backport*'
  tags:
    include:
    - 'v*'
    exclude:
    - '*dev*'
    - '*pre*'
    - '*post*'

stages:
  - stage: FirstPhase
    displayName: First Phase
    jobs:
    - template: run-tox-env.yml@OpenAstronomy
      parameters:
        submodules: false
        coverage: codecov
        toxdeps: tox-pypi-filter
        posargs: -n=4
        envs:
          - linux: codestyle
            name: codestyle

          - linux: py310
            name: py310_lin

  - stage: SecondPhase
    displayName: SecondPhase
    dependsOn: FirstPhase
    jobs:
    - template: run-tox-env.yml@OpenAstronomy
      parameters:
        submodules: false
        coverage: codecov
        toxdeps: tox-pypi-filter
        posargs: -n=4
        envs:
          - linux: py39
            name: py39_lin

          - linux: py311
            name: py311_lin

          - macos: py39
            name: py39_mac
            coverage: False

          - macos: py310
            name: py310_mac
            coverage: False

          - macos: py311
            name: py311_mac
            coverage: False

          - windows: py39
            name: py39_win

          - windows: py310
            name: py310_win

          - windows: py311
            name: py311_win

  # On branches which aren't master, and not Pull Requests, build the wheels but only upload them on tags
  - ${{ if and(ne(variables['Build.Reason'], 'PullRequest'), not(contains(variables['Build.SourceBranch'], 'master'))) }}:
    - stage: Release
      dependsOn: SecondPhase
      jobs:
      - template: publish.yml@OpenAstronomy
        parameters:
          # Only Upload to PyPI on tags
          ${{ if startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}:
            pypi_connection_name : 'PyPI'

          test_extras: 'test'
          test_command: 'pytest -p no:warnings --doctest-rst -m "not figure" --pyargs stixpy'
          submodules: false
          targets:
    #        - wheels_linux
    #        - wheels_macos
            - sdist
